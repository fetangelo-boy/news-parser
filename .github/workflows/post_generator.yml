name: Пост-генератор

on:
  schedule:
    # Среда в 10:00 МСК → 07:00 UTC
    - cron: '0 7 * * 3'
    # Суббота в 10:00 МСК → 07:00 UTC
    - cron: '0 7 * * 6'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Проверка репозитория
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Установка зависимостей
        run: pip install requests

      - name: Восстановление базы данных из кэша
        id: cache-db
        uses: actions/cache@v4
        with:
          path: news.db
          key: ${{ runner.os }}-news-db
          restore-keys: |
            ${{ runner.os }}-news-db

      - name: Генерация поста
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
        run: python generate_post.py
name: Парсинг + Генерация поста

on:
  schedule:
    - cron: '0 7 * * 3'  # среда в 10:00 МСК
    - cron: '0 7 * * 6'  # суббота в 10:00 МСК
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Проверка репозитория
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Установка зависимостей
        run: pip install telethon requests

      - name: Восстановление сессии Telethon
        run: |
          echo "${{ secrets.SESSION_BASE64 }}" | base64 -d > parser_session.session
        shell: bash

      - name: Парсинг новостей
        run: python parser.py

      - name: Экспорт новостей за 5 дней
        run: python export_last_news.py

      - name: Генерация поста
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
        run: python generate_post.py

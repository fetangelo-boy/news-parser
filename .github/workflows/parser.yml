name: Daily News Parser

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Проверка репозитория
        uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Установка зависимостей
        run: pip install telethon

      - name: Восстановление базы данных из кэша
        id: cache-db
        uses: actions/cache@v4
        with:
          path: news.db
          key: ${{ runner.os }}-news-db
          restore-keys: |
            ${{ runner.os }}-news-db

      - name: Восстановление сессии Telethon из секрета
        run: |
          echo "${{ secrets.SESSION_BASE64 }}" | base64 -d > parser_session.session
        shell: bash

      - name: Запуск парсера
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
        run: python parser.py

      - name: Сохранение базы данных в кэш
        if: always()
        uses: actions/cache/save@v4
        with:
          path: news.db
          key: ${{ runner.os }}-news-db
